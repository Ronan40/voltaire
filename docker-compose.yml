services:
  mongodb:
    image: mongo:7
    container_name: voltaire_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voltaire_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/voltaire
      JWT_SECRET: change-me-in-production
      STATIC_USERNAME: admin
      STATIC_PASSWORD: admin
      JWT_EXPIRES_IN: 1h
      REQUIRE_AUTH: "true"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voltaire_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
